<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beamer Tech - SMB Transaction Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .widget-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 20px 15px;
            }

            .widget-container {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Beamer Tech</h1>
            <p>SMB Transaction Voice Agent</p>
        </div>

        <div class="content">
            <div class="widget-container">
                <!-- ElevenLabs Conversational AI Widget -->
                <elevenlabs-convai agent-id="agent_2801kw1vvr7nft88jmt8nmxc15mk"></elevenlabs-convai>
            </div>
            <div class="info">
                💡 Click the microphone to start talking with your financial assistant
            </div>
        </div>
    </div>

    <!-- ElevenLabs Widget Script -->
    <script src="https://elevenlabs.io/convai-widget/index.js"></script>
</body>
</html>
